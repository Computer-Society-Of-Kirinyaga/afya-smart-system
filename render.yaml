services:
  - type: web
    name: afya-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile.prod
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: afya-db
          property: connectionString
      - key: JWT_ACCESS_TOKEN_SECRET
        sync: false
      - key: JWT_ACCESS_TOKEN_EXPIRATION_TIME
        value: 1h
      - key: JWT_REFRESH_TOKEN_SECRET
        sync: false
      - key: JWT_REFRESH_TOKEN_EXPIRATION_TIME
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: GEMINI_API_VERSION
        sync: false
      - key: OPENSMS_API_URL
        sync: false
      - key: OPENSMS_API_TOKEN
        sync: false
      - key: OPENSMS_SENDER_ID
        value: OPENSMS
      - key: APP_URL
        sync: false

databases:
  - name: afya-db
    databaseName: afya
    user: afya
    plan: free
